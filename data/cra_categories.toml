class = "class_i"
name = "Products with VPN functionality"
keywords = ["VPN", "virtual private network", "wireguard", "openvpn", "IPsec", "tunnel"]
conformity_note = "Self-assessment or harmonised standards (Article 32)"
applicable_articles = ["Article 32", "Annex III Part I (5)"]

[[category]]
id = "class1_network_management"
annex = "III"
class = "class_i"
name = "Network management systems"
keywords = ["network management", "SNMP", "network monitoring", "NMS", "network orchestration"]
conformity_note = "Self-assessment or harmonised standards (Article 32)"
