# CRA Product Categories from Annexes III and IV
# Source: EU Cyber Resilience Act (Regulation 2024/2847)
#
# Risk classes:
#   - "class_i"  = Important (Class I) -- Annex III, Part I
#   - "class_ii" = Important (Class II) -- Annex III, Part II
#   - "critical" = Critical -- Annex IV

# ─────────────────────────────────────────────
# Annex III, Part I -- Important (Class I)
# ─────────────────────────────────────────────

[[category]]
id = "class1_identity_management"
annex = "III"
class = "class_i"
name = "Identity management systems and privileged access management software"
keywords = ["identity management", "privileged access", "IAM", "PAM", "single sign-on", "SSO", "LDAP", "active directory"]
conformity_note = "Self-assessment or harmonised standards (Article 32)"
applicable_articles = ["Article 32", "Annex III Part I (1)"]

[[category]]
id = "class1_browsers"
annex = "III"
class = "class_i"
name = "Standalone and embedded browsers"
keywords = ["browser", "web browser", "chromium", "webkit", "gecko", "embedded browser"]
conformity_note = "Self-assessment or harmonised standards (Article 32)"
applicable_articles = ["Article 32", "Annex III Part I (2)"]

[[category]]
id = "class1_password_managers"
annex = "III"
class = "class_i"
name = "Password managers"
keywords = ["password manager", "credential manager", "password vault", "keychain", "secret manager"]
conformity_note = "Self-assessment or harmonised standards (Article 32)"
applicable_articles = ["Article 32", "Annex III Part I (3)"]

[[category]]
