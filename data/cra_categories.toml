applicable_articles = ["Article 32", "Annex III Part II (2)"]

[[category]]
id = "class2_tamper_resistant_microprocessors"
annex = "III"
class = "class_ii"
name = "Tamper-resistant microprocessors"
keywords = ["tamper-resistant", "tamper resistant microprocessor", "secure element", "hardware security module"]
conformity_note = "Third-party assessment required or harmonised standards with self-assessment (Article 32)"
applicable_articles = ["Article 32", "Annex III Part II (3)"]

[[category]]
id = "class2_tamper_resistant_microcontrollers"
annex = "III"
class = "class_ii"
