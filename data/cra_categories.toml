# ─────────────────────────────────────────────
# Annex IV -- Critical
# ─────────────────────────────────────────────

[[category]]
id = "critical_hsm"
annex = "IV"
class = "critical"
name = "Hardware security modules (HSMs), security boxes, and crypto gateways"
keywords = ["HSM", "hardware security module", "security box", "crypto gateway", "key management appliance"]
conformity_note = "European cybersecurity certification required (Article 32(6))"
applicable_articles = ["Article 32(6)", "Annex IV (1)"]

[[category]]
id = "critical_smart_meter_gateways"
annex = "IV"
class = "critical"
name = "Smart meter gateways and other devices for advanced security purposes within smart metering"
keywords = ["smart meter gateway", "smart metering", "meter gateway", "AMI gateway", "advanced metering"]
conformity_note = "European cybersecurity certification required (Article 32(6))"
applicable_articles = ["Article 32(6)", "Annex IV (2)"]

[[category]]
id = "critical_smartcards"
annex = "IV"
class = "critical"
name = "Smartcards or similar devices, including secure elements"
keywords = ["smartcard", "smart card", "secure element", "eSIM", "UICC", "SIM card", "eID card"]
conformity_note = "European cybersecurity certification required (Article 32(6))"
applicable_articles = ["Article 32(6)", "Annex IV (3)"]
